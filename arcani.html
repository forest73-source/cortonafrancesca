<style>
*{ margin:0; padding:0; box-sizing:border-box; }
body{ font-family:Georgia, serif; background:#090510; color:#f8e8c0; line-height:1.7; }
.container{ width:90%; max-width:1200px; margin:auto; }

/* HEADER & NAV */
header{ position:sticky; top:0; z-index:100; display:flex; align-items:center; justify-content:space-between; padding:18px 5vw; background:rgba(9,5,16,.95); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px); border-bottom:1px solid rgba(230,195,106,.25); }
header .brand{ font-size:1.1rem; letter-spacing:.14rem; color:#e6c36a; text-decoration:none; text-transform:uppercase; }
header nav ul{ list-style:none; display:flex; gap:22px; margin:0; padding:0; font-size:.8rem; letter-spacing:.1rem; }
header nav a{ color:#f8e8c0; text-decoration:none; opacity:.75; transition:.3s; padding-bottom:4px; border-bottom:1px solid transparent; }
header nav a:hover{ opacity:1; color:#e6c36a; }
header nav a.active{ opacity:1; color:#e6c36a; border-bottom-color:#e6c36a; }
.header-right{ display:flex; align-items:center; gap:20px; z-index: 110; }
.lang-toggle{ display:flex; gap:6px; align-items:center; }
.lang-toggle button{ background:transparent; border:1px solid rgba(230,195,106,.4); color:#f8e8c0; font-family:inherit; padding:4px 8px; cursor:pointer; }
.lang-toggle button.active{ background:#e6c36a; color:#1b0d04; border-color:#e6c36a; opacity:1; font-weight:bold; }

/* NUOVI STILI PER LA VETRINA DEGLI ARCANI */
.intro-arcani { text-align: center; padding: 60px 20px 20px 20px; }
.intro-arcani h1 { color: #e6c36a; font-size: 2.8rem; margin-bottom: 20px; }
.intro-arcani p { max-width: 800px; margin: 0 auto; font-size: 1.2rem; opacity: 0.9; }

/* Griglia artistica per esporre le carte */
.arcani-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 40px;
    padding: 40px 0 80px 0;
}
.arcano-card {
    background: rgba(230, 195, 106, 0.02);
    border: 1px solid rgba(230, 195, 106, 0.15);
    border-radius: 6px;
    padding: 20px;
    text-align: center;
    transition: transform 0.3s ease, border-color 0.3s ease;
}
.arcano-card:hover {
    transform: translateY(-5px);
    border-color: #e6c36a;
}

/* Controllo totale sulle immagini delle carte per non farle diventare giganti */
.arcano-card img {
    max-width: 100%;
    max-height: 420px;
    object-fit: contain;
    border-radius: 4px;
    margin-bottom: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
.arcano-card h3 { color: #e6c36a; font-size: 1.4rem; margin-bottom: 10px; font-weight: normal; }
.arcano-card p { font-size: 1rem; opacity: 0.8; }
</style>
